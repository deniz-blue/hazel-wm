on: [push]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: yesolutions/mirror-action@master
        with:
          REMOTE: 'https://codeberg.org/deniz-blue/hazel-wm.git'
          GIT_USERNAME: deniz-blue
          GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
